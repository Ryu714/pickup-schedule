<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>등하원 시간표</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    /* Base */
    --background: #ffffff;
    --foreground: #09090b;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --border: #e4e4e7;
    --ring: #18181b;
    --card: #ffffff;
    --card-foreground: #09090b;
    --primary: #18181b;
    --primary-foreground: #fafafa;
    --secondary: #f4f4f5;
    --secondary-foreground: #18181b;
    --accent: #f4f4f5;
    --accent-foreground: #18181b;
    --destructive: #ef4444;

    /* Type Scale */
    --text-xs: 0.6875rem;
    --text-sm: 0.8125rem;
    --text-base: 0.9375rem;
    --text-lg: 1.125rem;
    --text-xl: 1.25rem;

    /* Radius */
    --radius-sm: 8px;
    --radius-md: 12px;

    /* Spacing */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;

    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 12px 0 rgb(0 0 0 / 0.06), 0 1px 3px 0 rgb(0 0 0 / 0.04);

    /* Transition */
    --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);

    /* Academy Colors */
    --english: #2563eb;
    --english-bg: #eff6ff;
    --piano: #c026d3;
    --piano-bg: #faf5ff;
    --science: #059669;
    --science-bg: #ecfdf5;
    --soccer: #ca8a04;
    --soccer-bg: #fefce8;
    --art: #7c3aed;
    --art-bg: #f5f3ff;
    --baduk: #0891b2;
    --baduk-bg: #ecfeff;
    --froebel: #ea580c;
    --froebel-bg: #fff7ed;
    --kinder: #e11d48;
    --kinder-bg: #fff1f2;
    --school: #64748b;
    --school-bg: #f1f5f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geist', 'Noto Sans KR', system-ui, sans-serif;
    background: var(--muted);
    color: var(--foreground);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: var(--space-5) var(--space-5) var(--space-8);
  }

  /* Header */
  .header {
    padding: var(--space-2) 0 var(--space-3);
    margin-bottom: var(--space-3);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-bottom: 0;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: var(--muted);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-icon svg { color: var(--muted-foreground); width: 16px; height: 16px; }

  .header h1 {
    font-size: var(--text-xl);
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--foreground);
  }

  .header .period {
    font-size: var(--text-sm);
    color: var(--muted-foreground);
    font-weight: 400;
    margin-left: 6px;
  }

  /* Segmented Control (3 tabs) */
  .toggle-bar {
    display: flex;
    background: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-1);
    margin-bottom: var(--space-3);
    gap: 2px;
  }

  .toggle-btn {
    flex: 1;
    min-height: 44px;
    padding: 10px 0;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--muted-foreground);
    cursor: pointer;
    border-radius: var(--radius-sm);
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .toggle-btn:hover { color: var(--foreground); }

  .toggle-btn.active {
    background: var(--card);
    color: var(--foreground);
    font-weight: 600;
    box-shadow: var(--shadow);
  }

  .toggle-btn .tab-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .toggle-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* Day selector */
  .day-selector {
    display: flex;
    gap: var(--space-1);
    margin-bottom: var(--space-3);
  }

  .day-btn {
    flex: 1;
    min-height: 44px;
    padding: 10px 0 8px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--muted-foreground);
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .day-btn:hover { color: var(--foreground); background: var(--background); }

  .day-btn.active {
    background: var(--foreground);
    color: var(--primary-foreground);
    font-weight: 600;
  }

  .day-btn.active .day-dots span { background: var(--primary-foreground); opacity: 0.6; }

  .day-dots {
    display: flex;
    gap: 3px;
    height: 5px;
    align-items: center;
  }

  .day-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted-foreground);
    opacity: 0.35;
  }

  /* Summary bar */
  .summary-bar {
    background: var(--card);
    border: none;
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    margin-bottom: var(--space-4);
    font-size: var(--text-sm);
    color: var(--muted-foreground);
    display: flex;
    align-items: center;
    gap: var(--space-2);
    line-height: 1.6;
    box-shadow: var(--shadow-sm);
  }

  .summary-content { flex: 1; }

  .summary-line {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .summary-line + .summary-line { margin-top: var(--space-1); }

  .summary-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 54px;
    padding: 2px 10px;
    border-radius: 6px;
    font-size: var(--text-xs);
    font-weight: 600;
    flex-shrink: 0;
    color: #fff;
    letter-spacing: 0.03em;
  }

  .summary-badge-yoonwoo { background: #10b981; }
  .summary-badge-jun { background: #2563eb; }

  /* Schedule area */
  .schedule-area {
    min-height: 120px;
  }

  /* Individual schedule cards */
  .schedule-list {
    display: flex;
    flex-direction: column;
  }

  .schedule-item {
    position: relative;
    padding-bottom: var(--space-2);
    animation: cardIn 0.28s var(--transition) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Connector between cards */
  .schedule-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 20px;
    bottom: 0;
    height: 8px;
    width: 0;
    border-left: 1.5px dotted #d4d4d8;
  }

  .event-card {
    background: var(--card);
    border: none;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    transition: box-shadow var(--transition);
    border-left: 3px solid var(--border);
    box-shadow: var(--shadow);
  }

  .event-card:active {
    transform: scale(0.985);
  }

  @media (hover: hover) {
    .event-card:hover {
      box-shadow: var(--shadow-md);
    }
  }

  .event-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-1);
  }

  .event-time {
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: var(--text-lg);
    color: var(--foreground);
    letter-spacing: -0.02em;
  }

  .event-badge {
    font-size: var(--text-xs);
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 6px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .badge-arrive {
    color: #fff;
  }

  .badge-leave {
    background: transparent;
    border: 1.5px solid;
  }

  .event-name {
    font-weight: 500;
    font-size: var(--text-base);
    color: var(--foreground);
    letter-spacing: -0.01em;
  }

  .event-detail {
    font-size: var(--text-sm);
    color: var(--muted-foreground);
    margin-top: 1px;
  }

  .text-warn { color: var(--destructive); font-weight: 600; }

  /* Color assignments */
  .ev-english .event-card { border-left-color: var(--english); }
  .ev-english .badge-arrive { background: var(--english); }
  .ev-english .badge-leave { color: var(--english); border-color: var(--english); }

  .ev-piano .event-card { border-left-color: var(--piano); }
  .ev-piano .badge-arrive { background: var(--piano); }
  .ev-piano .badge-leave { color: var(--piano); border-color: var(--piano); }

  .ev-science .event-card { border-left-color: var(--science); }
  .ev-science .badge-arrive { background: var(--science); }
  .ev-science .badge-leave { color: var(--science); border-color: var(--science); }

  .ev-soccer .event-card { border-left-color: var(--soccer); }
  .ev-soccer .badge-arrive { background: var(--soccer); }
  .ev-soccer .badge-leave { color: var(--soccer); border-color: var(--soccer); }

  .ev-art .event-card { border-left-color: var(--art); }
  .ev-art .badge-arrive { background: var(--art); }
  .ev-art .badge-leave { color: var(--art); border-color: var(--art); }

  .ev-baduk .event-card { border-left-color: var(--baduk); }
  .ev-baduk .badge-arrive { background: var(--baduk); }
  .ev-baduk .badge-leave { color: var(--baduk); border-color: var(--baduk); }

  .ev-froebel .event-card { border-left-color: var(--froebel); }
  .ev-froebel .badge-arrive { background: var(--froebel); }
  .ev-froebel .badge-leave { color: var(--froebel); border-color: var(--froebel); }

  .ev-kinder .event-card { border-left-color: var(--kinder); }
  .ev-kinder .badge-arrive { background: var(--kinder); }
  .ev-kinder .badge-leave { color: var(--kinder); border-color: var(--kinder); }

  .ev-school .event-card { border-left-color: var(--school); }
  .ev-school .badge-arrive { background: var(--school); }
  .ev-school .badge-leave { color: var(--school); border-color: var(--school); }

  /* Side by Side (함께보기) */
  .side-by-side {
    display: grid;
    grid-template-columns: 1fr var(--space-2) 1fr;
    gap: 0;
    min-height: 120px;
    position: relative;
  }

  .side-header {
    display: grid;
    grid-template-columns: 1fr var(--space-2) 1fr;
    margin-bottom: var(--space-3);
  }

  .side-header-name {
    text-align: center;
    padding: var(--space-1) 0;
  }

  .side-header-name .summary-badge {
    font-size: var(--text-base);
    padding: 2px 12px;
  }

  .side-divider-header {
    background: transparent;
  }

  .side-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .side-col-left {
    padding: 6px 8px 6px 6px;
    background: linear-gradient(180deg, rgba(253, 242, 248, 0.45) 0%, rgba(253, 242, 248, 0.25) 100%);
    border-radius: var(--radius-md);
  }
  .side-col-right {
    padding: 6px 6px 6px 8px;
    background: linear-gradient(180deg, rgba(239, 246, 255, 0.45) 0%, rgba(239, 246, 255, 0.25) 100%);
    border-radius: var(--radius-md);
  }

  .side-divider {
    background: transparent;
  }

  /* Now indicator */
  .now-indicator {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .now-indicator-line {
    position: absolute;
    left: 8px;
    right: 8px;
    height: 1.5px;
    background: #3b82f6;
    border-radius: 1px;
  }
  .now-indicator-dot {
    position: relative;
    width: 8px;
    height: 8px;
    background: #3b82f6;
    border-radius: 50%;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3);
    z-index: 11;
    animation: nowPulse 3s ease-in-out infinite;
  }
  @keyframes nowPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.25); }
    50% { transform: scale(1.1); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08), 0 0 6px rgba(59, 130, 246, 0.12); }
  }
  .now-dimming {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9;
    pointer-events: none;
    border-radius: var(--radius-md);
    background: linear-gradient(to bottom, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.5) 60%, rgba(255,255,255,0) 100%);
  }

  .side-row {
    display: contents;
  }

  .side-cell {
    padding-bottom: 6px;
  }

  .side-cell-empty {
    padding-bottom: 6px;
  }

  .side-card {
    background: var(--card);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 10px;
    border-left: 3px solid var(--border);
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition);
  }

  .side-card:active {
    transform: scale(0.985);
  }

  @media (hover: hover) {
    .side-card:hover {
      box-shadow: var(--shadow);
    }
  }

  .side-card .event-time {
    font-size: var(--text-base);
  }

  .side-card .event-name {
    font-size: var(--text-sm);
  }

  .side-card .event-detail {
    font-size: 0.72rem;
  }

  .side-card .event-badge {
    font-size: var(--text-xs);
    padding: 1px 6px;
  }

  /* Color for side cards */
  .side-card.sc-english { border-left-color: var(--english); }
  .side-card.sc-english .badge-arrive { background: var(--english); }
  .side-card.sc-english .badge-leave { color: var(--english); border-color: var(--english); }

  .side-card.sc-piano { border-left-color: var(--piano); }
  .side-card.sc-piano .badge-arrive { background: var(--piano); }
  .side-card.sc-piano .badge-leave { color: var(--piano); border-color: var(--piano); }

  .side-card.sc-science { border-left-color: var(--science); }
  .side-card.sc-science .badge-arrive { background: var(--science); }
  .side-card.sc-science .badge-leave { color: var(--science); border-color: var(--science); }

  .side-card.sc-soccer { border-left-color: var(--soccer); }
  .side-card.sc-soccer .badge-arrive { background: var(--soccer); }
  .side-card.sc-soccer .badge-leave { color: var(--soccer); border-color: var(--soccer); }

  .side-card.sc-art { border-left-color: var(--art); }
  .side-card.sc-art .badge-arrive { background: var(--art); }
  .side-card.sc-art .badge-leave { color: var(--art); border-color: var(--art); }

  .side-card.sc-baduk { border-left-color: var(--baduk); }
  .side-card.sc-baduk .badge-arrive { background: var(--baduk); }
  .side-card.sc-baduk .badge-leave { color: var(--baduk); border-color: var(--baduk); }

  .side-card.sc-froebel { border-left-color: var(--froebel); }
  .side-card.sc-froebel .badge-arrive { background: var(--froebel); }
  .side-card.sc-froebel .badge-leave { color: var(--froebel); border-color: var(--froebel); }

  .side-card.sc-kinder { border-left-color: var(--kinder); }
  .side-card.sc-kinder .badge-arrive { background: var(--kinder); }
  .side-card.sc-kinder .badge-leave { color: var(--kinder); border-color: var(--kinder); }

  .side-card.sc-school { border-left-color: var(--school); }
  .side-card.sc-school .badge-arrive { background: var(--school); }
  .side-card.sc-school .badge-leave { color: var(--school); border-color: var(--school); }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted-foreground);
  }
  .empty-state svg { margin-bottom: 10px; color: var(--border); }
  .empty-state p { font-size: var(--text-sm); font-weight: 500; }

  /* Fade transition */
  .fade-enter {
    animation: fadeContent 200ms var(--transition);
  }

  @keyframes fadeContent {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Accessibility */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Responsive */
  @media (max-width: 420px) {
    .wrapper { padding: var(--space-4) var(--space-4) var(--space-8); }
    .header h1 { font-size: var(--text-lg); }
    .event-time { font-size: 1rem; }
    .event-card { padding: var(--space-3) 14px; }
    .side-card { padding: var(--space-2); }
    .side-card .event-time { font-size: var(--text-sm); }
    .side-card .event-name { font-size: 0.78rem; }
    .side-card .event-badge { font-size: 0.625rem; padding: 1px 5px; }
    .side-col-left { padding-right: 6px; padding-left: 6px; }
    .side-col-right { padding-left: 6px; padding-right: 6px; }
  }

  @media (max-width: 360px) {
    .side-card .event-detail { display: none; }
  }
  </style>

  <div class="wrapper">
  <header class="header">
    <div class="header-top">
      <div class="header-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
      </div>
      <h1>등하원 시간표 <span class="period">2026년 3–4월</span></h1>
    </div>
  </header>

  <nav class="toggle-bar" role="tablist" aria-label="보기 모드">
    <button class="toggle-btn active" role="tab" aria-selected="true" onclick="switchChild('both')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      함께보기
    </button>
    <button class="toggle-btn" role="tab" aria-selected="false" onclick="switchChild('yoonwoo')">
      <span class="tab-dot" style="background:#10b981"></span>
      최윤우
    </button>
    <button class="toggle-btn" role="tab" aria-selected="false" onclick="switchChild('jun')">
      <span class="tab-dot" style="background:#2563eb"></span>
      류준
    </button>
  </nav>

  <div class="day-selector" id="daySelector" role="tablist" aria-label="요일 선택"></div>

  <div class="summary-bar" aria-live="polite">
    <div class="summary-content" id="summaryContent"></div>
  </div>

  <main class="schedule-area" id="scheduleArea" aria-live="polite"></main>
  </div>

  <script>
const DAYS = ['월','화','수','목','금'];

const DATA = {
  yoonwoo: {
    label: '최윤우',
    info: {
      '월': '등/하교 → 영어 → 하연과학',
      '화': '등/하교 → 영어 → 피아노 → 축구(심화)',
      '수': '등/하교 → 프뢰벨',
      '목': '등/하교 → 피아노 → 영어',
      '금': '등/하교 → 바둑 → 축구(취미)',
    },
    schedule: {
      '월': [
        { time: '1:30', name: '하교', type: 'school', badge: '하교', dir: 'leave', detail: '한아람초' },

let currentChild = 'both';
let currentDay = '월';
let _sideRows = [];
const todayIdx = new Date().getDay();
if (todayIdx >= 1 && todayIdx <= 5) currentDay = DAYS[todayIdx - 1];

function isToday() {
  const d = new Date().getDay();
  if (d < 1 || d > 5) return false;
  return currentDay === DAYS[d - 1];
}

function getCurrentMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  // 1~8시는 오후(PM), 9~12시는 오전/정오
  const hour = (h >= 1 && h <= 8) ? h + 12 : h;
  return hour * 60 + m;
}

function formatTime(t) {
  const h = parseInt(t.split(':')[0]);
  const prefix = (h >= 1 && h <= 8) || h === 12 ? '오후' : '오전';
  return prefix + ' ' + t;
}

function switchChild(child) {
  currentChild = child;
  document.querySelectorAll('.toggle-btn').forEach((btn, i) => {
    const isActive = (i === 0 && child === 'both') ||
      (i === 1 && child === 'yoonwoo') ||
      (i === 2 && child === 'jun');
    btn.classList.toggle('active', isActive);
    btn.setAttribute('aria-selected', isActive);
  });
  renderDays();
  render();
}

function selectDay(day) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach((btn, i) => {
    btn.classList.toggle('active', DAYS[i] === day);
  });
  render();
}

function renderDays() {
  document.getElementById('daySelector').innerHTML = DAYS.map(d => {
    let count;
    if (currentChild === 'both') {
      count = (DATA.yoonwoo.schedule[d] || []).length + (DATA.jun.schedule[d] || []).length;
    } else {
      count = (DATA[currentChild].schedule[d] || []).length;
    }
    const dots = Math.min(count, 3);
    const dotHtml = dots > 0
      ? '<div class="day-dots">' + Array.from({length: dots}, () => '<span></span>').join('') + '</div>'
      : '<div class="day-dots"></div>';
    return `<button class="day-btn ${d === currentDay ? 'active' : ''}" onclick="selectDay('${d}')">
      ${d}${dotHtml}
    </button>`;
  }).join('');
}

function buildEventCard(ev) {
  const badgeDot = ev.dir === 'arrive' ? '●' : '○';
  const badgeClass = ev.dir === 'arrive' ? 'badge-arrive' : 'badge-leave';
  return `<div class="event-card-header">
    <span class="event-time">${formatTime(ev.time)}</span>
    <span class="event-badge ${badgeClass}">${badgeDot} ${ev.badge}</span>
  </div>
  <div class="event-name">${ev.name}</div>
  ${ev.detail ? `<div class="event-detail">${ev.detail}</div>` : ''}`;
}

function buildSideCard(ev) {
  const badgeDot = ev.dir === 'arrive' ? '●' : '○';
  const badgeClass = ev.dir === 'arrive' ? 'badge-arrive' : 'badge-leave';
  return `<div class="side-card sc-${ev.type}">
    <div class="event-card-header">
      <span class="event-time">${formatTime(ev.time)}</span>
      <span class="event-badge ${badgeClass}">${badgeDot} ${ev.badge}</span>
    </div>
    <div class="event-name">${ev.name}</div>
    ${ev.detail ? `<div class="event-detail">${ev.detail}</div>` : ''}
  </div>`;
}

function renderSummary() {
  const sc = document.getElementById('summaryContent');
  if (currentChild === 'both') {
    const infoY = DATA.yoonwoo.info[currentDay] || '일정 없음';
    const infoJ = DATA.jun.info[currentDay] || '일정 없음';
    sc.innerHTML = `
      <div class="summary-line"><span class="summary-badge summary-badge-yoonwoo">최윤우</span> <span>${infoY}</span></div>
      <div class="summary-line"><span class="summary-badge summary-badge-jun">류 준</span> <span>${infoJ}</span></div>
    `;
  } else {
    const info = DATA[currentChild].info[currentDay] || '';
    sc.innerHTML = `<div class="summary-line"><span>${currentDay}요일 · ${info}</span></div>`;
  }
}

function render() {
  renderSummary();
  const area = document.getElementById('scheduleArea');
  area.classList.remove('fade-enter');
  void area.offsetWidth; // force reflow
  area.classList.add('fade-enter');

  if (currentChild === 'both') {
    renderBoth();
  } else {
    renderSingle();
  }
}

function renderSingle() {
  const events = DATA[currentChild].schedule[currentDay] || [];
  const area = document.getElementById('scheduleArea');

  if (events.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>이 날은 일정이 없습니다</p>
    </div>`;
    return;
  }

  area.innerHTML = '<div class="schedule-list">' + events.map((ev, i) => {
    return `<div class="schedule-item ev-${ev.type}" style="animation-delay:${i * 40}ms">
      <div class="event-card">${buildEventCard(ev)}</div>
    </div>`;
  }).join('') + '</div>';
}

function renderBoth() {
  const evY = (DATA.yoonwoo.schedule[currentDay] || []).map(e => ({...e, child: 'yoonwoo'}));
  const evJ = (DATA.jun.schedule[currentDay] || []).map(e => ({...e, child: 'jun'}));
  const area = document.getElementById('scheduleArea');

  if (evY.length === 0 && evJ.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>이 날은 일정이 없습니다</p>
    </div>`;
    return;
  }

  // Merge and sort by time
  const all = [...evY, ...evJ].sort((a, b) => parseTime(a.time) - parseTime(b.time));

  // Group into rows: events at the same time should share a row
  const rows = [];
  let i = 0;
  while (i < all.length) {
    const t = parseTime(all[i].time);
    const row = { left: null, right: null };
    while (i < all.length && parseTime(all[i].time) === t) {
      if (all[i].child === 'yoonwoo') {
        if (row.left) {
          rows.push({...row});
          row.left = null;
          row.right = null;
        }
        row.left = all[i];
      } else {
        if (row.right) {
          rows.push({...row});
          row.left = null;
          row.right = null;
        }
        row.right = all[i];
      }
      i++;
    }
    rows.push(row);
  }

  let html = `<div class="side-header">
    <div class="side-header-name"><span class="summary-badge summary-badge-yoonwoo">최윤우</span></div>
    <div class="side-divider-header"></div>
    <div class="side-header-name"><span class="summary-badge summary-badge-jun">류 준</span></div>
  </div>
  <div class="side-by-side">`;

  // Build left column, divider, right column
  let leftHtml = '<div class="side-col side-col-left">';
  let rightHtml = '<div class="side-col side-col-right">';

  rows.forEach((row, idx) => {
    const delay = `style="animation-delay:${idx * 40}ms"`;
    if (row.left) {
      leftHtml += `<div class="side-cell" ${delay}>${buildSideCard(row.left)}</div>`;
    } else {
      leftHtml += `<div class="side-cell-empty" ${delay}><div style="height:${estimateCardHeight(row.right)}px"></div></div>`;
    }
    if (row.right) {
      rightHtml += `<div class="side-cell" ${delay}>${buildSideCard(row.right)}</div>`;
    } else {
      rightHtml += `<div class="side-cell-empty" ${delay}><div style="height:${estimateCardHeight(row.left)}px"></div></div>`;
    }
  });

  leftHtml += '</div>';
  rightHtml += '</div>';

  _sideRows = rows;

  html += leftHtml + '<div class="side-divider"></div>' + rightHtml + '</div>';
  area.innerHTML = html;
  requestAnimationFrame(() => renderNowIndicator(true));
}

function estimateCardHeight(ev) {
  if (!ev) return 60;
  return ev.detail ? 76 : 64;
}

function renderNowIndicator(scrollToCenter) {
  const existing = document.querySelector('.now-indicator');
  if (existing) existing.remove();
  const existingDim = document.querySelector('.now-dimming');
  if (existingDim) existingDim.remove();

  if (currentChild !== 'both' || !isToday()) return;

  const sbs = document.querySelector('.side-by-side');
  if (!sbs || _sideRows.length === 0) return;

  const nowMin = getCurrentMinutes();

  // 각 행의 시간(분) 구하기
  const rowTimes = _sideRows.map(r => parseTime((r.left || r.right).time));
  const firstTime = rowTimes[0];
  const lastTime = rowTimes[rowTimes.length - 1];

  // 이벤트 범위 ±60분 벗어나면 비표시
  if (nowMin < firstTime - 60 || nowMin > lastTime + 60) return;

  const leftCol = sbs.querySelector('.side-col-left');
  if (!leftCol) return;
  const cells = leftCol.querySelectorAll('.side-cell, .side-cell-empty');
  if (cells.length === 0) return;

  const sbsRect = sbs.getBoundingClientRect();
  const rowPositions = [];
  for (let i = 0; i < cells.length; i++) {
    const rect = cells[i].getBoundingClientRect();
    rowPositions.push({
      timeMin: rowTimes[i],
      top: rect.top - sbsRect.top,
      bottom: rect.bottom - sbsRect.top,
      mid: (rect.top + rect.bottom) / 2 - sbsRect.top,
    });
  }

  let indicatorY;
  if (nowMin <= rowPositions[0].timeMin) {
    indicatorY = rowPositions[0].top;
  } else if (nowMin >= rowPositions[rowPositions.length - 1].timeMin) {
    indicatorY = rowPositions[rowPositions.length - 1].bottom;
  } else {
    let beforeIdx = 0;
    for (let i = 0; i < rowPositions.length; i++) {
      if (rowPositions[i].timeMin <= nowMin) beforeIdx = i;
    }
    const afterIdx = beforeIdx + 1;
    const before = rowPositions[beforeIdx];
    const after = rowPositions[afterIdx];
    const timeDelta = after.timeMin - before.timeMin;
    const ratio = timeDelta > 0 ? (nowMin - before.timeMin) / timeDelta : 0;
    indicatorY = before.bottom + (after.top - before.bottom) * ratio;
  }

  const indicator = document.createElement('div');
  indicator.className = 'now-indicator';
  indicator.style.top = indicatorY + 'px';
  indicator.innerHTML = `
    <div class="now-indicator-line"></div>
    <div class="now-indicator-dot"></div>
  `;
  sbs.appendChild(indicator);

  if (indicatorY > 0) {
    const dimming = document.createElement('div');
    dimming.className = 'now-dimming';
    dimming.style.height = indicatorY + 'px';
    sbs.appendChild(dimming);
  }

  if (scrollToCenter) {
    indicator.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

setInterval(() => {
  if (currentChild === 'both' && isToday()) renderNowIndicator();
}, 60000);

renderDays();
render();
