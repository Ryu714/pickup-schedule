<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>등하원 시간표</title>
  <script>(function(){if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')})()</script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
  :root {
    /* Base */
    --background: #ffffff;
    --foreground: #09090b;
    --muted: #f4f4f5;
    --muted-foreground: #71717a;
    --border: #e4e4e7;
    --ring: #18181b;
    --card: #ffffff;
    --card-foreground: #09090b;
    --primary: #18181b;
    --primary-foreground: #fafafa;
    --secondary: #f4f4f5;
    --secondary-foreground: #18181b;
    --accent: #f4f4f5;
    --accent-foreground: #18181b;
    --destructive: #ef4444;

    /* Type Scale */
    --text-xs: 0.6875rem;
    --text-sm: 0.8125rem;
    --text-base: 0.9375rem;
    --text-lg: 1.125rem;
    --text-xl: 1.25rem;

    /* Radius */
    --radius-sm: 8px;
    --radius-md: 12px;

    /* Spacing */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-8: 32px;

    /* Shadows */
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.04);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.04);
    --shadow-md: 0 4px 12px 0 rgb(0 0 0 / 0.06), 0 1px 3px 0 rgb(0 0 0 / 0.04);

    /* Transition */
    --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);

  }

  .dark {
    --background: #000000;
    --foreground: #fafafa;
    --muted: #171717;
    --muted-foreground: #a1a1aa;
    --border: #262626;
    --ring: #d4d4d8;
    --card: #1a1a1a;
    --card-foreground: #fafafa;
    --primary: #fafafa;
    --primary-foreground: #18181b;
    --secondary: #171717;
    --secondary-foreground: #fafafa;
    --accent: #171717;
    --accent-foreground: #fafafa;
    --destructive: #dc2626;

    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
    --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.4), 0 1px 2px -1px rgb(0 0 0 / 0.3);
    --shadow-md: 0 4px 12px 0 rgb(0 0 0 / 0.4), 0 1px 3px 0 rgb(0 0 0 / 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geist', 'Noto Sans KR', system-ui, sans-serif;
    background: var(--background);
    color: var(--foreground);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: var(--space-5) var(--space-5) var(--space-8);
  }

  /* Header */
  .header {
    padding: var(--space-2) 0 var(--space-3);
    margin-bottom: var(--space-3);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-bottom: 0;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: var(--muted);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-icon svg { color: var(--muted-foreground); width: 16px; height: 16px; }

  .header h1 {
    font-size: var(--text-xl);
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--foreground);
  }

  .header .period {
    font-size: var(--text-sm);
    color: var(--muted-foreground);
    font-weight: 400;
    margin-left: 6px;
  }

  /* Weather Widget */
  .weather-widget {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 4px 10px;
    background: var(--muted);
    border-radius: 999px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.5s ease;
    contain: layout style;
    white-space: nowrap;
    font-family: 'Geist', sans-serif;
    font-variant-numeric: tabular-nums;
  }

  .weather-widget.loaded { opacity: 1; }

  .weather-now {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .weather-icon {
    font-size: 1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    color: var(--muted-foreground);
  }

  .weather-icon svg {
    width: 20px;
    height: 20px;
  }

  .weather-temp {
    font-size: var(--text-xl);
    font-weight: 600;
    color: var(--foreground);
    letter-spacing: -0.02em;
  }

  .weather-range {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
    margin-left: 6px;
    font-size: 0.75rem;
    font-weight: 500;
    line-height: 1.2;
  }

  .weather-high, .weather-low {
    display: flex;
    justify-content: space-between;
    min-width: 2.5em;
  }

  .weather-low { color: #3b82f6; }
  .weather-high { color: #ef4444; }

  /* Day selector */
  .day-selector {
    display: flex;
    background: var(--muted);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-1);
    margin-bottom: var(--space-3);
    gap: 2px;
  }

  .day-btn {
    flex: 1;
    min-height: 44px;
    padding: 10px 0;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--muted-foreground);
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-btn:hover { color: var(--foreground); background: var(--accent); }

  .day-btn.active {
    background: var(--primary);
    color: var(--primary-foreground);
    font-weight: 600;
  }

  .summary-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 54px;
    padding: 2px 10px;
    border-radius: 6px;
    font-size: var(--text-xs);
    font-weight: 600;
    flex-shrink: 0;
    color: var(--background);
    letter-spacing: 0.03em;
  }

  .summary-badge-yoonwoo { background: var(--foreground); }
  .summary-badge-jun { background: var(--foreground); word-spacing: 0.25em; }

  /* Schedule area */
  .schedule-area {
    min-height: 120px;
  }

  /* Individual schedule cards */
  .schedule-list {
    display: flex;
    flex-direction: column;
  }

  .schedule-item {
    position: relative;
    padding-bottom: var(--space-2);
    animation: cardIn 0.28s var(--transition) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Connector between cards */
  .schedule-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 20px;
    bottom: 0;
    height: 8px;
    width: 0;
    border-left: 1.5px dotted #d4d4d8;
  }

  .event-card {
    background: var(--card);
    border: none;
    border-radius: var(--radius-md);
    padding: 14px 16px;
    transition: box-shadow var(--transition);
    border-left: 3px solid var(--border);
    box-shadow: var(--shadow);
  }

  .event-card:active {
    transform: scale(0.985);
  }

  @media (hover: hover) {
    .event-card:hover {
      box-shadow: var(--shadow-md);
    }
  }

  .event-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-1);
  }

  .event-time {
    font-family: 'Geist', sans-serif;
    font-weight: 700;
    font-size: var(--text-lg);
    color: var(--foreground);
    letter-spacing: -0.02em;
  }

  .event-badge {
    font-size: var(--text-xs);
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 6px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .badge-arrive {
    background: var(--foreground);
    color: var(--background);
  }

  .badge-leave {
    background: transparent;
    border: 1.5px solid var(--foreground);
    color: var(--foreground);
  }

  .event-name {
    font-weight: 500;
    font-size: var(--text-base);
    color: var(--foreground);
    letter-spacing: -0.01em;
  }

  .event-detail {
    font-size: var(--text-sm);
    color: var(--muted-foreground);
    margin-top: 1px;
  }

  .text-warn { color: var(--destructive); font-weight: 600; }

  /* Color assignments — border-left, badge 모두 foreground 통일 */

  /* Side by Side (함께보기) */
  .side-by-side {
    display: grid;
    grid-template-columns: 1fr var(--space-2) 1fr;
    gap: 0;
    min-height: 120px;
    position: relative;
  }

  .side-col-name {
    text-align: center;
    padding: var(--space-2) 0;
    position: relative;
    z-index: 11;
  }

  .side-col-name .summary-badge {
    font-size: var(--text-base);
    padding: 2px 12px;
    min-width: 72px;
  }

  .side-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
  }

  .side-col::after {
    content: '';
    position: absolute;
    top: 40px;
    bottom: 12px;
    width: 3px;
    background: var(--border);
    z-index: 0;
  }

  .side-col-left {
    padding: 6px 8px 6px 0;
  }
  .side-col-left::after {
    left: calc(50% - 4px);
  }
  .side-col-right {
    padding: 6px 0 6px 8px;
  }
  .side-col-right::after {
    left: calc(50% + 4px);
  }

  .side-divider {
    background: transparent;
  }

  /* Now indicator */
  .now-indicator {
    position: absolute;
    left: 0;
    right: 0;
    height: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .now-indicator-line {
    position: absolute;
    left: 8px;
    right: 8px;
    height: 2px;
    top: -1px;
    border-radius: 1px;
    background: #ef4444;
  }
  .now-indicator-dot {
    position: relative;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #ef4444;
    border: 2.5px solid var(--background);
    z-index: 11;
    animation: dotPulse 2s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 1px rgba(239,68,68,0.25); }
    50% { transform: scale(1.2); box-shadow: 0 0 0 6px rgba(239,68,68,0.15), 0 0 10px rgba(239,68,68,0.2); }
  }
  .side-card.is-past > * {
    opacity: 0.4;
    transition: opacity 300ms ease;
  }

  .side-row {
    display: contents;
  }

  .side-card {
    position: relative;
    z-index: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 10px;
    min-height: 74px;
    border-left: 3px solid var(--foreground);
    box-shadow: var(--shadow-sm);
    transition: all 150ms ease;
  }

  @media (hover: hover) {
    .side-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
  }

  .side-card:active {
    transform: translateY(-1px) scale(0.985);
  }

  .side-card:focus-visible {
    outline: 2px solid var(--ring);
    outline-offset: 2px;
  }

  .side-card .event-time {
    font-size: var(--text-base);
  }

  .side-card .event-name {
    font-size: var(--text-sm);
  }

  .side-card .event-detail {
    font-size: 0.72rem;
  }

  .side-card .event-badge {
    font-size: var(--text-xs);
    padding: 1px 6px;
  }


  /* Glow effect for next upcoming card */
  @keyframes cardGlow {
    0%, 100% { box-shadow: 0 0 4px 1px rgba(245, 158, 11, 0.15), var(--shadow-sm); }
    50% { box-shadow: 0 0 20px 6px rgba(245, 158, 11, 0.55), 0 0 8px 3px rgba(245, 158, 11, 0.3), var(--shadow-sm); }
  }
  .side-card.glow-next {
    animation: cardGlow 2s ease-in-out infinite;
    border-left-width: 4px;
  }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted-foreground);
  }
  .empty-state svg { margin-bottom: 10px; color: var(--border); }
  .empty-state p { font-size: var(--text-sm); font-weight: 500; }


  /* Accessibility */
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* Theme toggle */
  .theme-toggle {
    width: 28px;
    height: 28px;
    border: none;
    background: var(--muted);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--muted-foreground);
    transition: background var(--transition), color var(--transition);
    margin-left: 6px;
  }
  .theme-toggle:hover { background: var(--accent); color: var(--foreground); }
  .theme-toggle svg { width: 14px; height: 14px; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  .dark .theme-toggle .icon-sun { display: block; }
  .dark .theme-toggle .icon-moon { display: none; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Responsive */
  @media (max-width: 420px) {
    .wrapper { padding: var(--space-4) var(--space-4) var(--space-8); }
    .header h1 { font-size: var(--text-lg); }
    .event-time { font-size: 1rem; }
    .event-card { padding: var(--space-3) 14px; }
    .side-card { padding: var(--space-2); }
    .side-card .event-time { font-size: var(--text-sm); }
    .side-card .event-name { font-size: 0.78rem; }
    .side-card .event-badge { font-size: 0.625rem; padding: 1px 5px; }
    .side-col-left { padding-right: 6px; padding-left: 6px; }
    .side-col-right { padding-left: 6px; padding-right: 6px; }
    .weather-widget { padding: 3px 8px; }
    .weather-temp { font-size: var(--text-lg); }
    .weather-icon svg { width: 18px; height: 18px; }
    .weather-range { font-size: 0.6875rem; margin-left: 4px; }
  }

  @media (max-width: 360px) {
    .side-card .event-detail { display: none; }
    .weather-range { display: none; }
  }
  </style>
</head>
<body>
  <div class="wrapper">
  <header class="header">
    <div class="header-top">
      <div class="header-icon">

  </header>

  <div class="day-selector" id="daySelector" role="tablist" aria-label="요일 선택"></div>

  <main class="schedule-area" id="scheduleArea" aria-live="polite"></main>
  </div>

let currentDay = '월';
let _sideRows = [];
const todayIdx = new Date().getDay();
if (todayIdx >= 1 && todayIdx <= 5) currentDay = DAYS[todayIdx - 1];

function isToday() {
  const d = new Date().getDay();
  if (d < 1 || d > 5) return false;
  return currentDay === DAYS[d - 1];
}

function getCurrentMinutes() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function formatTime(t) {
  const [hStr, mStr] = t.split(':');
  const h = parseInt(hStr);
  const prefix = h >= 12 ? '오후' : '오전';
  const displayH = h > 12 ? h - 12 : h;
  return prefix + ' ' + displayH + ':' + mStr;
}

function selectDay(day) {
  if (day === currentDay) return;
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach((btn, i) => {
    btn.classList.toggle('active', DAYS[i] === day);
  });
  render();
}

function renderDays() {
  document.getElementById('daySelector').innerHTML = DAYS.map(d =>
    `<button class="day-btn ${d === currentDay ? 'active' : ''}" onclick="selectDay('${d}')">${d}</button>`
  ).join('');
}

function buildSideCard(ev, typeColorMap) {
  const badgeDot = ev.dir === 'arrive' ? '●' : '○';
  const badgeClass = ev.dir === 'arrive' ? 'badge-arrive' : 'badge-leave';
  const borderColor = (typeColorMap[ev.type] || 0) % 2 === 0 ? 'var(--foreground)' : 'var(--muted-foreground)';
  return `<div class="side-card" style="border-left-color:${borderColor}">
    <div class="event-card-header">
      <span class="event-time">${formatTime(ev.time)}</span>
      <span class="event-badge ${badgeClass}">${badgeDot} ${ev.badge}</span>
    </div>
    <div class="event-name">${ev.name}</div>
    ${ev.detail ? `<div class="event-detail">${ev.detail}</div>` : ''}
  </div>`;
}

function render() {
  renderBoth();
}

function renderBoth() {
  const evY = (DATA.yoonwoo.schedule[currentDay] || []).map(e => ({...e, child: 'yoonwoo'}));
  const evJ = (DATA.jun.schedule[currentDay] || []).map(e => ({...e, child: 'jun'}));
  const area = document.getElementById('scheduleArea');

  if (evY.length === 0 && evJ.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>이 날은 일정이 없습니다</p>
    </div>`;
    return;
  }

  // Merge and sort by time
  const all = [...evY, ...evJ].sort((a, b) => parseTime(a.time) - parseTime(b.time));

  // Group into rows: events at the same time should share a row
  const rows = [];
  let i = 0;
  while (i < all.length) {
    const t = parseTime(all[i].time);
    const row = { left: null, right: null };
    while (i < all.length && parseTime(all[i].time) === t) {
      if (all[i].child === 'yoonwoo') {
        if (row.left) {
          rows.push({...row});
          row.left = null;
          row.right = null;
        }
        row.left = all[i];
      } else {
        if (row.right) {
          rows.push({...row});
          row.left = null;
          row.right = null;
        }
        row.right = all[i];
      }
      i++;
    }
    rows.push(row);
  }

  // 아이별 type 등장순서 → 검은색/회색 번갈아 지정
  function buildTypeColorMap(events) {
    const map = {};
    let idx = 0;
    events.forEach(ev => {
      if (!(ev.type in map)) map[ev.type] = idx++;
    });
    return map;
  }
  const leftColorMap = buildTypeColorMap(evY);
  const rightColorMap = buildTypeColorMap(evJ);

  let html = `<div class="side-by-side">`;

  // Build left column, divider, right column
  let leftHtml = '<div class="side-col side-col-left"><div class="side-col-name"><span class="summary-badge summary-badge-yoonwoo">최윤우</span></div>';
  let rightHtml = '<div class="side-col side-col-right"><div class="side-col-name"><span class="summary-badge summary-badge-jun">류 준</span></div>';

  rows.forEach((row, idx) => {
    const delay = `style="animation-delay:${idx * 40}ms"`;
    if (row.left) {
      leftHtml += `<div class="side-cell" ${delay}>${buildSideCard(row.left, leftColorMap)}</div>`;
    } else {
      leftHtml += `<div class="side-cell-empty" ${delay}><div style="height:${estimateCardHeight(row.right)}px"></div></div>`;
    }
    if (row.right) {
      rightHtml += `<div class="side-cell" ${delay}>${buildSideCard(row.right, rightColorMap)}</div>`;
    } else {
      rightHtml += `<div class="side-cell-empty" ${delay}><div style="height:${estimateCardHeight(row.left)}px"></div></div>`;
    }
  });

  leftHtml += '</div>';
  rightHtml += '</div>';

  _sideRows = rows;

  html += leftHtml + '<div class="side-divider"></div>' + rightHtml + '</div>';
  area.innerHTML = html;

  // 좌우 셀 높이 동기화: 추정값 오차로 인한 수직 위치 어긋남 방지
  const sbsEl = area.querySelector('.side-by-side');
  if (sbsEl) {
    const lCells = sbsEl.querySelector('.side-col-left').querySelectorAll('.side-cell, .side-cell-empty');
    const rCells = sbsEl.querySelector('.side-col-right').querySelectorAll('.side-cell, .side-cell-empty');
    for (let i = 0; i < lCells.length; i++) {
      const maxH = Math.max(lCells[i].offsetHeight, rCells[i].offsetHeight);
      lCells[i].style.minHeight = maxH + 'px';
      rCells[i].style.minHeight = maxH + 'px';
    }
  }

  requestAnimationFrame(() => renderNowIndicator(true));
}

function estimateCardHeight(ev) {
  if (!ev) return 60;
  return ev.detail ? 76 : 64;
}

function renderNowIndicator(scrollToCenter) {
  const sbs = document.querySelector('.side-by-side');
  if (sbs) {
    const existing = sbs.querySelector('.now-indicator');
    if (existing) existing.remove();
  }

  if (!isToday()) return;
  if (!sbs || _sideRows.length === 0) return;

  const nowMin = getCurrentMinutes();

  // 각 행의 시간(분) 구하기
  const rowTimes = _sideRows.map(r => parseTime((r.left || r.right).time));
  const firstTime = rowTimes[0];
  const lastTime = rowTimes[rowTimes.length - 1];

  // 이벤트 범위 ±60분 벗어나면 비표시
  if (nowMin < firstTime - 60 || nowMin > lastTime + 60) return;

  const leftCol = sbs.querySelector('.side-col-left');
  const rightCol = sbs.querySelector('.side-col-right');
  if (!leftCol || !rightCol) return;
  const leftCells = leftCol.querySelectorAll('.side-cell, .side-cell-empty');
  const rightCells = rightCol.querySelectorAll('.side-cell, .side-cell-empty');
  if (leftCells.length === 0) return;

  const sbsRect = sbs.getBoundingClientRect();
  const rowPositions = [];
  for (let i = 0; i < leftCells.length; i++) {
    const lRect = leftCells[i].getBoundingClientRect();
    const rRect = rightCells[i] ? rightCells[i].getBoundingClientRect() : lRect;
    rowPositions.push({
      timeMin: rowTimes[i],
      top: Math.min(lRect.top, rRect.top) - sbsRect.top,
      bottom: Math.max(lRect.bottom, rRect.bottom) - sbsRect.top,
    });
  }

  let indicatorY;
  if (nowMin <= rowPositions[0].timeMin) {
    indicatorY = rowPositions[0].top - 6;
  } else if (nowMin > rowPositions[rowPositions.length - 1].timeMin) {
    indicatorY = rowPositions[rowPositions.length - 1].bottom + 6;
  } else {
    let beforeIdx = 0;
    for (let i = 0; i < rowPositions.length; i++) {
      if (rowPositions[i].timeMin < nowMin) beforeIdx = i;
    }
    const afterIdx = beforeIdx + 1;
    const before = rowPositions[beforeIdx];
    const after = rowPositions[afterIdx];
    indicatorY = (before.bottom + after.top) / 2;
  }

  const indicator = document.createElement('div');
  indicator.className = 'now-indicator';
  indicator.style.top = indicatorY + 'px';
  indicator.innerHTML = `
    <div class="now-indicator-line"></div>
    <div class="now-indicator-dot"></div>
  `;
  sbs.appendChild(indicator);

  // is-past 제거 + 추가를 한 번에 처리 (깜빡임 방지)
  for (let i = 0; i < rowTimes.length; i++) {
    const lCard = leftCells[i] && leftCells[i].querySelector('.side-card');
    const rCard = rightCells[i] && rightCells[i].querySelector('.side-card');
    const isPast = rowTimes[i] < nowMin;
    if (lCard) lCard.classList.toggle('is-past', isPast);
    if (rCard) rCard.classList.toggle('is-past', isPast);
  }

  if (scrollToCenter) {
    indicator.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  applyGlowToNextCards();
}

function applyGlowToNextCards() {
  document.querySelectorAll('.glow-next').forEach(el => el.classList.remove('glow-next'));

  if (!isToday()) return;
  if (_sideRows.length === 0) return;

  const nowMin = getCurrentMinutes();

  let nextRowIdx = -1;
  for (let i = 0; i < _sideRows.length; i++) {
    const row = _sideRows[i];
    const rowTime = parseTime((row.left || row.right).time);
    if (rowTime >= nowMin) {
      nextRowIdx = i;
      break;
    }
  }

  if (nextRowIdx === -1) return;

  const sbs = document.querySelector('.side-by-side');
  if (!sbs) return;

  const leftCol = sbs.querySelector('.side-col-left');
  const rightCol = sbs.querySelector('.side-col-right');
  if (!leftCol || !rightCol) return;

  const leftCells = leftCol.querySelectorAll('.side-cell, .side-cell-empty');
  const rightCells = rightCol.querySelectorAll('.side-cell, .side-cell-empty');

  const glowCards = [];
  if (leftCells[nextRowIdx]) {
    const card = leftCells[nextRowIdx].querySelector('.side-card');
    if (card) glowCards.push(card);
  }
  if (rightCells[nextRowIdx]) {
    const card = rightCells[nextRowIdx].querySelector('.side-card');
    if (card) glowCards.push(card);
  }
  // 도트와 동기화: 애니메이션 리셋 후 동일 프레임에서 시작
  glowCards.forEach(card => {
    card.style.animation = 'none';
    card.offsetHeight; // force reflow
    card.style.animation = '';
    card.classList.add('glow-next');
  });
}

// 정분(XX:00)에 맞춰 갱신 동기화
function scheduleMinuteSync() {
  const msToNextMin = (60 - new Date().getSeconds()) * 1000;
  setTimeout(() => {
    if (isToday()) renderNowIndicator();
    else applyGlowToNextCards();
    setInterval(() => {
      if (isToday()) renderNowIndicator();
      else applyGlowToNextCards();
    }, 60000);
  }, msToNextMin);
}
scheduleMinuteSync();

renderDays();
render();

function renderWeather(data) {
  const info = WMO_WEATHER[data.code] || { icon: '☁️', label: '날씨' };
  document.getElementById('weatherIcon').innerHTML = info.icon;
  document.getElementById('weatherTemp').textContent = data.temp + '°';
  document.getElementById('weatherLow').textContent = data.min + '°';
  document.getElementById('weatherHigh').textContent = data.max + '°';
  document.getElementById('weatherSr').textContent =
    info.label + ', 현재 ' + data.temp + '도, 최저 ' + data.min + '도, 최고 ' + data.max + '도';
  document.getElementById('weatherWidget').classList.add('loaded');
}

async function loadWeather() {
  const cached = localStorage.getItem('weather_cache');
  if (cached) {
    const { data, ts } = JSON.parse(cached);
    if (Date.now() - ts < 10 * 60 * 1000 && data.min !== undefined) {
      renderWeather(data);
      return;
    }
  }

  try {
    const controller = new AbortController();
    const tid = setTimeout(() => controller.abort(), 5000);
    const res = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&forecast_days=1&timezone=Asia%2FSeoul`,
      { signal: controller.signal }
    );
    clearTimeout(tid);
    const json = await res.json();
    const data = {
      temp: Math.round(json.current.temperature_2m),
      code: json.current.weather_code,
      min: Math.round(json.daily.temperature_2m_min[0]),
      max: Math.round(json.daily.temperature_2m_max[0])
    };
    localStorage.setItem('weather_cache', JSON.stringify({ data, ts: Date.now() }));
    renderWeather(data);
  } catch (e) {
    if (cached) renderWeather(JSON.parse(cached).data);
  }
}

loadWeather();
setInterval(loadWeather, 10 * 60 * 1000);
